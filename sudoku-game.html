<!DOCTYPE html>
<html>
<head>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

table{
border-collapse:collapse;
margin:auto;
}

td{
border:2px solid white;
width:40px;
height:40px;
}

input{
width:38px;
height:38px;
text-align:center;
font-size:18px;
background:black;
color:white;
border:none;
}

.fixed{
color:yellow;
font-weight:bold;
}

</style>

<script>

// Correct Sudoku Solution
const solution = [
[5,3,4,6,7,8,9,1,2],
[6,7,2,1,9,5,3,4,8],
[1,9,8,3,4,2,5,6,7],
[8,5,9,7,6,1,4,2,3],
[4,2,6,8,5,3,7,9,1],
[7,1,3,9,2,4,8,5,6],
[9,6,1,5,3,7,2,8,4],
[2,8,7,4,1,9,6,3,5],
[3,4,5,2,8,6,1,7,9]
];

function validateInput(cell){
if(cell.value < 1 || cell.value > 9)
cell.value="";
}

function checkGrid(){

let inputs=document.querySelectorAll("input");
let correct=true;
let filled=true;

inputs.forEach((cell)=>{

let val=parseInt(cell.value);

if(!val)
filled=false;

let row=cell.dataset.row;
let col=cell.dataset.col;

if(val!=solution[row][col])
correct=false;

});

if(filled){

if(correct)
document.getElementById("msg").innerHTML="🎉 Correct Sudoku!";
else
document.getElementById("msg").innerHTML="❌ Wrong Sudoku";

}

}

</script>

</head>

<body>
